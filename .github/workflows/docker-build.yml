name: Build and Push Docker Image

# NOTE: Full builds with baked-in models (~87 GB image) require a machine with
# 200+ GB disk. Standard GitHub Actions runners (ubuntu-latest) do not have
# enough space. Use workflow_dispatch to build manually, or build locally:
#   DOCKER_BUILDKIT=1 docker build --secret id=HF_TOKEN,env=HF_TOKEN \
#       -t anand9930/ltx-video:latest .
#   docker push anand9930/ltx-video:latest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ltx-video:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ltx-video:${{ github.sha }}
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          no-cache: true
